  <line x1="510" y1="120" x2="510" y2="320" stroke="#4d6a70" stroke-width="8" stroke-linecap="round"/>
  <circle cx="510" cy="220" r="26" fill="#ffffff" stroke="#00a9c1" stroke-width="8"/>
  <text x="178" y="205" font-family="Avenir Next, Avenir, Segoe UI, sans-serif" font-size="20" fill="#0f3840">Watergangsectie</text>
  <text x="610" y="205" font-family="Avenir Next, Avenir, Segoe UI, sans-serif" font-size="20" fill="#0f3840">Watergangsectie</text>
