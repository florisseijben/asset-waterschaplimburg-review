<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Bovenaanzicht van een sectie</title>
  <desc id="desc">Planweergave van een sectie binnen een lijnvormige hoofdstructuur.</desc>
  <rect width="960" height="420" fill="#f8fcfd"/>
  <rect x="70" y="70" width="820" height="280" fill="#ffffff" stroke="#b8d7de"/>
  <line x1="130" y1="220" x2="830" y2="220" stroke="#00a9c1" stroke-width="8" stroke-linecap="round"/>
  <rect x="365" y="172" width="160" height="96" fill="#dff3f7" stroke="#00a9c1" stroke-width="4"/>
  <text x="445" y="226" text-anchor="middle" font-family="Avenir Next, Avenir, Segoe UI, sans-serif" font-size="22" fill="#0f3840">Sectie</text>
  <text x="130" y="130" font-family="Avenir Next, Avenir, Segoe UI, sans-serif" font-size="24" fill="#0f3840">Positie van een sectie in bovenaanzicht</text>
</svg>
